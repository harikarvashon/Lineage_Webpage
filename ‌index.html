// Function to highlight node and its lineage
function highlightNode(params) {
    if (params.nodes.length === 0) {
        network.body.data.nodes.update(
            network.body.data.nodes.get().map(n => {
                return {id: n.id, color: n.originalColor};
            })
        );
        return;
    }

    let selected = params.nodes[0];
    let upstream = ANCESTORS[selected] || [];
    let downstream = DESCENDANTS[selected] || [];

    network.body.data.nodes.update(
        network.body.data.nodes.get().map(n => {
            if (n.id === selected) return {id: n.id, color: "#ff0000"};
            if (upstream.includes(n.id)) return {id: n.id, color: "#00aa00"};
            if (downstream.includes(n.id)) return {id: n.id, color: "#0000ff"};
            return {id: n.id, color: "#cccccc33"};
        })
    );
}

// Function to filter by source system

    const dropdown = document.getElementById("sourceFilter");

    network.body.data.nodes.update(
        network.body.data.nodes.get().map(n => {
            if (!selectedSource) return {id: n.id, color: n.originalColor};
            if (n.id === selectedSource || ANCESTORS[selectedSource].includes(n.id) || DESCENDANTS[selectedSource].includes(n.id))

            else

        })
    );
}
